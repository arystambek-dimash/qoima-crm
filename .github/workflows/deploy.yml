name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  DEPLOY_PATH: ${{ vars.DEPLOY_PATH || '/home/ubuntu/projects/qoima-crm' }}
  DEPLOY_HOST: ${{ secrets.DEPLOY_HOST || '185.22.67.18' }}
  DEPLOY_USER: ${{ secrets.DEPLOY_USER || 'ubuntu' }}
  DEPLOY_PORT: ${{ vars.DEPLOY_PORT || '22' }}

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure SSH
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          if [ -z "$DEPLOY_SSH_KEY" ]; then
            echo "DEPLOY_SSH_KEY secret is required." >&2
            exit 1
          fi
          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$DEPLOY_PORT" -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Create deploy directory
        run: |
          ssh -i ~/.ssh/deploy_key -p "$DEPLOY_PORT" \
            "$DEPLOY_USER@$DEPLOY_HOST" \
            "mkdir -p '${DEPLOY_PATH}'"

      - name: Sync project files
        run: |
          rsync -az --delete \
            --exclude '.git' \
            --exclude '.github' \
            --exclude '.env*' \
            --exclude 'backend/.env' \
            --exclude 'frontend/.env.local' \
            --exclude 'frontend/.next' \
            --exclude 'frontend/node_modules' \
            --exclude '**/__pycache__' \
            -e "ssh -i ~/.ssh/deploy_key -p ${DEPLOY_PORT} -o StrictHostKeyChecking=yes" \
            ./ "$DEPLOY_USER@$DEPLOY_HOST:${DEPLOY_PATH}/"

      - name: Write production env file
        env:
          PRODUCTION_ENV_FILE: ${{ secrets.PRODUCTION_ENV_FILE }}
        run: |
          if [ -n "$PRODUCTION_ENV_FILE" ]; then
            printf '%s' "$PRODUCTION_ENV_FILE" | ssh -i ~/.ssh/deploy_key -p "$DEPLOY_PORT" \
              "$DEPLOY_USER@$DEPLOY_HOST" \
              "cat > '${DEPLOY_PATH}/.env'"
          else
            echo "PRODUCTION_ENV_FILE secret is empty; keeping existing server .env."
          fi

      - name: Initialize HTTPS certificate
        run: |
          ssh -i ~/.ssh/deploy_key -p "$DEPLOY_PORT" \
            "$DEPLOY_USER@$DEPLOY_HOST" \
            "cd '${DEPLOY_PATH}' && \
             test -f .env && \
             chmod +x deploy/init-letsencrypt.sh && \
             ./deploy/init-letsencrypt.sh"

      - name: Deploy with Docker Compose
        run: |
          ssh -i ~/.ssh/deploy_key -p "$DEPLOY_PORT" \
            "$DEPLOY_USER@$DEPLOY_HOST" \
            "cd '${DEPLOY_PATH}' && \
             test -f .env && \
             docker compose --env-file .env up -d --build && \
             docker compose --env-file .env exec -T backend python manage.py ensure_superuser && \
             WEBHOOK_URL=\$(grep -E '^TELEGRAM_WEBHOOK_URL=' .env | tail -n 1 | cut -d= -f2-) && \
             BOT_TOKEN=\$(grep -E '^TELEGRAM_BOT_TOKEN=' .env | tail -n 1 | cut -d= -f2-) && \
             if [ -n \"\$WEBHOOK_URL\" ] && [ -n \"\$BOT_TOKEN\" ]; then \
               docker compose --env-file .env exec -T backend python manage.py set_telegram_webhook \"\$WEBHOOK_URL\"; \
             fi && \
             docker compose --env-file .env restart backend frontend nginx && \
             docker image prune -f"
