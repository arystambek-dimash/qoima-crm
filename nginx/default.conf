upstream qoima_backend {
    server backend:8000;
}

upstream qoima_frontend {
    server frontend:3000;
}

server {
    listen 80;
    server_name crm.qoima.com.kz;

    client_max_body_size 25m;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name crm.qoima.com.kz;

    client_max_body_size 25m;

    ssl_certificate /etc/letsencrypt/live/crm.qoima.com.kz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/crm.qoima.com.kz/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:qoima_ssl:10m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location /static/ {
        alias /var/www/static/;
        expires 30d;
        access_log off;
    }

    location /media/ {
        alias /var/www/media/;
        expires 7d;
        access_log off;
    }

    location /api/ {
        proxy_pass http://qoima_backend;
    }

    location /admin/ {
        proxy_pass http://qoima_backend;
    }

    location / {
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_pass http://qoima_frontend;
    }
}
