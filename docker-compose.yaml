services:
  database:
    image: postgres:16-alpine
    container_name: qoima-postgres
    restart: unless-stopped
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-qoima_postgres_db}
      POSTGRES_USER: ${POSTGRES_USER:-qoima_postgres_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASS:-qoima_postgres_password}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: qoima-backend
    container_name: qoima-backend
    restart: unless-stopped
    command: >
      sh -c "python manage.py migrate &&
             python manage.py ensure_superuser --skip-if-missing &&
             python manage.py collectstatic --noinput &&
             python manage.py runserver 0.0.0.0:8000"
    environment:
      DJANGO_DEBUG: ${DJANGO_DEBUG:-True}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-http://localhost}
      DJANGO_SUPERUSER_EMAIL: ${DJANGO_SUPERUSER_EMAIL:-}
      DJANGO_SUPERUSER_USERNAME: ${DJANGO_SUPERUSER_USERNAME:-admin}
      DJANGO_SUPERUSER_PASSWORD: ${DJANGO_SUPERUSER_PASSWORD:-}
      DJANGO_SUPERUSER_RESET_PASSWORD: ${DJANGO_SUPERUSER_RESET_PASSWORD:-false}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_WEBHOOK_SECRET: ${TELEGRAM_WEBHOOK_SECRET:-}
      POSTGRES_DB: ${POSTGRES_DB:-qoima_postgres_db}
      POSTGRES_USER: ${POSTGRES_USER:-qoima_postgres_user}
      POSTGRES_PASS: ${POSTGRES_PASS:-qoima_postgres_password}
      POSTGRES_HOST: database
      POSTGRES_PORT: 5432
    volumes:
      - static_data:/app/staticfiles
      - media_data:/app/media
    depends_on:
      database:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-}
    image: qoima-frontend
    container_name: qoima-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-}
    depends_on:
      - backend

  nginx:
    image: nginx:1.27-alpine
    container_name: qoima-nginx
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - static_data:/var/www/static:ro
      - media_data:/var/www/media:ro
    depends_on:
      - backend
      - frontend

volumes:
  pg_data:
  static_data:
  media_data:
